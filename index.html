<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Earn</title>
    <script src="https://sad.adsgram.ai/js/adsgram-stream.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 80%; max-width: 400px; }
        button { background-color: #FF9800; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:active { transform: scale(0.95); }
        .score-box { background: #e1f5fe; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .points-text { font-size: 30px; font-weight: bold; color: #0277bd; }
    </style>
</head>
<body>
    <div class="card">
        <h2>MAdsgram App</h2>
        
        <div class="score-box">
            <div style="font-size: 14px; color: #546e7a;">သင့်လက်ရှိရမှတ်</div>
            <div id="pointsDisplay" class="points-text">0</div>
            <div style="font-size: 12px; color: #0277bd;">Points</div>
        </div>

        <p>ကြော်ငြာကြည့်ပြီး Point များ ရယူပါ</p>
        <button onclick="watchAd()">📺 ကြော်ငြာကြည့်မည်</button>
    </div>

    <script>
        // ဖုန်းမှာ Point သိမ်းထားဖို့ ကုဒ်
        const STORAGE_KEY_POINTS = 'my_points';
        let points = parseInt(localStorage.getItem(STORAGE_KEY_POINTS)) || 0;
        
        function updateUI() {
            document.getElementById('pointsDisplay').innerText = points;
        }
        
        updateUI();

        function watchAd() {
            // သင့်ရဲ့ Block ID အသစ် ၂၆၃၆၄ ကို ဒီမှာ ထည့်ထားပါတယ်
            const AdController = window.Adsgram.init({ blockId: "26364" });
            
            AdController.show().then((result) => {
                // ကြော်ငြာကြည့်တာ ပြီးဆုံးရင် Point ၁၀ မှတ် ပေါင်းပေးမယ်
                points += 10;
                localStorage.setItem(STORAGE_KEY_POINTS, points);
                updateUI();
                alert("ကျေးဇူးတင်ပါတယ်။ Point ၁၀ မှတ် ရရှိပါပြီ!");
            }).catch((err) => {
                alert("ကြော်ငြာပြသရန် အဆင်မပြေသေးပါ။ ခဏနေမှ ထပ်ကြိုးစားကြည့်ပါဗျ။");
                console.error(err);
            });
        }
    </script>
</body>
</html>
